name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run codegen
      - run: npm run typecheck
      - run: npm run validate-i18n
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          pip install -r backend/admin_app/requirements.txt
          pip install ruff mypy
      - name: Run unit tests
        run: pytest backend/tests -m "not integration" -q
        env:
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          PYTHONPATH: backend/shared:backend/admin_app:backend/news_storage_app:backend/layout_admin_app
      - name: Lint backend
        run: ruff check backend/ --config backend/shared/pyproject.toml
      - name: Typecheck backend
        run: mypy --config-file backend/shared/pyproject.toml backend/shared backend/admin_app/admin_app backend/news_storage_app/news_storage_app backend/layout_admin_app/layout_admin_app
