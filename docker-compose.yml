x-subgraph-healthcheck: &subgraph-healthcheck
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 120s

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  admin_app:
    build: ./backend/admin_app
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5001 --reload"
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/admin_app:/app
      - ./media:/media

  news_storage_app:
    build: ./backend/news_storage_app
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5002 --reload"
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/news_storage_app:/app
      - ./media:/media

  layout_admin_app:
    build: ./backend/layout_admin_app
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5003 --reload"
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/layout_admin_app:/app

  content_subgraph:
    build: ./backend/subgraphs/content_subgraph
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5011 --reload"
    ports:
      - "5011:5011"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/subgraphs/content_subgraph:/app
    networks:
      default:
        aliases:
          - content-subgraph
    healthcheck:
      <<: *subgraph-healthcheck
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5011/health', timeout=3).read()",
        ]

  layout_subgraph:
    build: ./backend/subgraphs/layout_subgraph
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5012 --reload"
    ports:
      - "5012:5012"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/subgraphs/layout_subgraph:/app
    networks:
      default:
        aliases:
          - layout-subgraph
    healthcheck:
      <<: *subgraph-healthcheck
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5012/health', timeout=3).read()",
        ]

  site_subgraph:
    build: ./backend/subgraphs/site_subgraph
    command: sh -c "pip install -e /shared && uvicorn main:app --host 0.0.0.0 --port 5013 --reload"
    ports:
      - "5013:5013"
    env_file: .env
    environment:
      GEO_REGIONS_ENABLED: "true"
      GEO_DUAL_WRITE_ENABLED: "true"
      GEO_READ_FROM_REGIONS: "true"
      GEO_GRAPHQL_REGION_ARGS: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/shared:/shared
      - ./backend/subgraphs/site_subgraph:/app
    networks:
      default:
        aliases:
          - site-subgraph
    healthcheck:
      <<: *subgraph-healthcheck
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5013/health', timeout=3).read()",
        ]

  graphql_router:
    build: ./backend/graphql_router
    ports:
      - "4000:4000"
    depends_on:
      content_subgraph:
        condition: service_healthy
        restart: true
      layout_subgraph:
        condition: service_healthy
        restart: true
      site_subgraph:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost/graphql
      GRAPHQL_INTERNAL_URL: http://graphql_router:4000/graphql
      API_INTERNAL_URL: http://nginx
      MEDIA_INTERNAL_URL: http://news_storage_app:5002
    depends_on:
      graphql_router:
        condition: service_healthy
        restart: true

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      admin_app:
        condition: service_started
      news_storage_app:
        condition: service_started
      layout_admin_app:
        condition: service_started
      graphql_router:
        condition: service_healthy

volumes:
  mongo_data:
