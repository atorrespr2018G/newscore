events {}

http {
  client_max_body_size 60m;

  limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  upstream admin_app {
    server admin_app:5001;
  }

  upstream news_storage_app {
    server news_storage_app:5002;
  }

  upstream layout_admin_app {
    server layout_admin_app:5003;
  }

  upstream graphql_router {
    server graphql_router:4000;
  }

  server {
    listen 80;

    location /api/admin/auth/login {
      limit_req zone=login_limit burst=3 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://admin_app/auth/login;
    }

    location /api/admin/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://admin_app/;
    }

    location /api/news/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://news_storage_app/;
    }

    location /api/layout/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://layout_admin_app/;
    }

    location /graphql {
      limit_req zone=graphql_limit burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://graphql_router/graphql;
    }
  }
}
