type Query {
  homepageFeed(market: String!, town: String, regionCode: String, pageName: String): HomepageFeed!
  articleBySlug(slug: String!, market: String!): Article
  breakingNews(market: String!): JSON
}

type HomepageFeed {
  layoutId: ID
  pageName: String!
  slots: [HomepageSlot!]!
}

type HomepageSlot {
  id: ID!
  positionKey: String!
  displayName: String
  presentationType: String!
  contentType: String!
  articles: [Article!]!
}

type Article {
  id: ID!
  slug: String!
  title: String!
  status: String!
  authorName: String!
  thumbnailUrl: String
  videoUrl: String
  createdAt: String!
  publishedAt: String
  body: String
  tags: [String!]
  categoryId: ID
  storyId: ID
  mediaIds: [String!]
  media: [MediaAsset!]
  viewCount: Int
  storyUpdates: [Article!]
}

type MediaAsset {
  id: ID!
  url: String!
  fileType: String!
  width: Int
  height: Int
}

scalar JSON
