query HomepageFeed($market: String!, $town: String, $pageName: String) {
  homepageFeed(market: $market, town: $town, pageName: $pageName) {
    layoutId
    pageName
    slots {
      id
      positionKey
      displayName
      presentationType
      contentType
      articles {
        id
        slug
        title
        body
        status
        authorName
        thumbnailUrl
        videoUrl
        createdAt
        publishedAt
      }
    }
  }
}
