query HomepageFeed($market: String!, $town: String) {
  homepageFeed(market: $market, town: $town) {
    layoutId
    pageName
    slots {
      id
      positionKey
      displayName
      presentationType
      contentType
      articles {
        id
        slug
        title
        status
        authorName
        thumbnailUrl
        createdAt
        publishedAt
      }
    }
  }
}
