query ArticleBySlug($slug: String!, $market: String!) {
  articleBySlug(slug: $slug, market: $market) {
    id
    slug
    title
    status
    authorName
    thumbnailUrl
    videoUrl
    createdAt
    publishedAt
    body
    tags
    categoryId
    mediaIds
    media {
      id
      url
      fileType
      width
      height
    }
    viewCount
  }
}
